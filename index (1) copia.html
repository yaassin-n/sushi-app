<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sushi Counter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root {
  --sf: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
  --mono: "SF Mono", ui-monospace, "Courier New", monospace;
  --green: #32d74b; --green-a: rgba(50,215,75,.18);
  --red: #ff453a;   --red-a:   rgba(255,69,58,.14);
  --gold: #ffd60a;  --gold-a:  rgba(255,214,10,.14);
  --t1: #ffffff; --t2: rgba(255,255,255,.60); --t3: rgba(255,255,255,.30); --t4: rgba(255,255,255,.12);
  --g1: rgba(255,255,255,.038); --g2: rgba(255,255,255,.068); --g3: rgba(255,255,255,.10);
  --b1: rgba(255,255,255,.13); --b2: rgba(255,255,255,.04);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--sf);background:#000;color:var(--t1);
  display:flex;flex-direction:column;
  background-image:
    radial-gradient(ellipse 110% 65% at 50% -8%,rgba(50,215,75,.09) 0%,transparent 62%),
    radial-gradient(ellipse 75% 55% at 88% 85%,rgba(255,69,58,.06) 0%,transparent 60%),
    radial-gradient(ellipse 65% 45% at 8%  92%,rgba(10,132,255,.05) 0%,transparent 58%);
  background-attachment:fixed;
}
main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
main::-webkit-scrollbar{display:none}
.view{display:none}
.view.active{display:flex;flex-direction:column;animation:vIn .42s cubic-bezier(.16,1,.3,1) both}
@keyframes vIn{from{opacity:0;transform:translateY(16px) scale(.984)}to{opacity:1;transform:none}}

/* ── NAV pill ── */
nav{
  position:fixed;bottom:max(20px,env(safe-area-inset-bottom,20px));
  left:50%;transform:translateX(-50%);
  z-index:300;display:flex;align-items:center;padding:5px;gap:2px;
  border-radius:500px;
  background:rgba(16,16,22,.84);
  backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);
  box-shadow:0 2px 0 rgba(255,255,255,.07) inset,0 18px 56px rgba(0,0,0,.75),0 1px 0 rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.10);
}
.nb{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:5px;border:none;background:none;cursor:pointer;color:var(--t3);
  font-family:var(--sf);padding:9px 30px;border-radius:490px;
  transition:color .18s,background .18s;min-width:88px}
.nb svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.65;stroke-linecap:round;stroke-linejoin:round}
.nb .nl{font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;opacity:.8}
.nb.active{color:var(--t1);background:rgba(255,255,255,.10)}

/* ── COUNT VIEW ── */
#view-count{
  min-height:100dvh;align-items:center;justify-content:center;
  padding:0 24px calc(118px + env(safe-area-inset-bottom,0px));
  gap:0;position:relative;
}

/* Status chip */
.chip{
  position:absolute;top:max(32px,env(safe-area-inset-top,32px));
  left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:8px;padding:8px 16px;
  border-radius:500px;
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);
  border:1px solid rgba(255,255,255,.08);
  font-size:12px;font-weight:500;color:var(--t2);white-space:nowrap;
  transition:all .3s ease;
}
.chip.live{background:rgba(50,215,75,.08);border-color:rgba(50,215,75,.24)}
.pip{width:6px;height:6px;border-radius:50%;background:var(--t3);flex-shrink:0;transition:background .3s,box-shadow .3s}
.pip.on{background:var(--green);animation:pp 2.2s ease-in-out infinite}
@keyframes pp{0%,100%{box-shadow:0 0 0 3px rgba(50,215,75,.20)}50%{box-shadow:0 0 0 8px rgba(50,215,75,.05)}}
#stimer{font-family:var(--mono);font-size:11.5px;color:var(--t3);transition:color .3s;letter-spacing:.02em}
#stimer.on{color:var(--green)}

/* Sushi center */
.sc{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:14px;cursor:pointer;
  user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
  padding:16px 0 6px;
}

/* Disc */
.disc{
  position:relative;
  width:clamp(150px,40vw,198px);height:clamp(150px,40vw,198px);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.068);
  backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.13),
    0 1px 0 rgba(255,255,255,.18) inset,
    0 -1px 0 rgba(0,0,0,.5) inset,
    0 26px 68px rgba(0,0,0,.68),
    0 6px 18px rgba(0,0,0,.45);
  transition:transform .24s cubic-bezier(.34,1.45,.64,1),box-shadow .22s ease;
  will-change:transform;
}
/* Specular */
.disc::after{
  content:'';position:absolute;top:5%;left:10%;right:10%;height:36%;
  border-radius:50%;
  background:radial-gradient(ellipse at 50% 0%,rgba(255,255,255,.14) 0%,transparent 72%);
  pointer-events:none;
}
/* Border light gradient overlay */
.disc::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:linear-gradient(165deg,rgba(255,255,255,.16) 0%,rgba(255,255,255,.03) 50%,transparent 100%);
  pointer-events:none;z-index:1;
}
.disc.press{transform:scale(.91);box-shadow:0 0 0 1px rgba(255,255,255,.09),0 8px 22px rgba(0,0,0,.52)}
.disc.bounce{transform:scale(1.08);box-shadow:0 0 0 1px rgba(255,255,255,.20),0 0 0 14px rgba(255,255,255,.025),0 32px 80px rgba(0,0,0,.72)}

.emoji-el{
  font-size:clamp(68px,17vw,98px);line-height:1;pointer-events:none;
  transition:transform .24s cubic-bezier(.34,1.45,.64,1);
  filter:drop-shadow(0 8px 22px rgba(0,0,0,.58));
  position:relative;z-index:2;
}

/* Counter */
.cblock{display:flex;flex-direction:column;align-items:center;gap:4px}
.ndisp{
  font-family:var(--mono);font-size:clamp(82px,24vw,144px);font-weight:800;
  line-height:.88;letter-spacing:-0.05em;color:var(--t1);
  font-variant-numeric:tabular-nums;
  text-shadow:0 0 80px rgba(255,255,255,.05);
}
.nlbl{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.12em;text-transform:uppercase}
.ntype{
  margin-top:2px;padding:4px 14px;border-radius:500px;
  background:var(--g1);border:1px solid rgba(255,255,255,.07);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  font-size:10.5px;font-weight:600;color:var(--t3);letter-spacing:.10em;text-transform:uppercase;
}

/* Controls */
.ctrls{display:flex;align-items:center;justify-content:center;gap:26px;padding:14px 0 8px}
.cbtn{
  width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;background:none;
  display:flex;align-items:center;justify-content:center;
  position:relative;transition:transform .14s ease;
}
.cbtn:active{transform:scale(.87)}
.cbg{
  position:absolute;inset:0;border-radius:50%;
  background:var(--g1);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 0 0 1px rgba(255,255,255,.09),0 1px 0 rgba(255,255,255,.13) inset,0 8px 28px rgba(0,0,0,.52);
  transition:background .2s;
}
.cbtn:active .cbg{background:var(--g2)}
.cbtn svg{position:relative;z-index:1;width:18px;height:18px;fill:none;stroke:var(--t2);stroke-width:1.9;stroke-linecap:round}
.cbtn.minus svg{stroke:var(--red)}
.cbtn.rst svg{stroke:var(--t3)}

/* Start button — Apple Prominent */
.swrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.sbtn{
  width:74px;height:74px;border-radius:50%;border:none;cursor:pointer;background:none;
  display:flex;align-items:center;justify-content:center;
  position:relative;transition:transform .20s cubic-bezier(.34,1.45,.64,1);
}
.sbtn:active{transform:scale(.88)}
.sbg{
  position:absolute;inset:0;border-radius:50%;
  background:linear-gradient(155deg,rgba(50,215,75,.62) 0%,rgba(28,150,45,.38) 45%,rgba(8,8,12,.72) 100%);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:
    0 0 0 1px rgba(50,215,75,.32),
    0 1px 0 rgba(255,255,255,.18) inset,
    0 0 36px rgba(50,215,75,.22),
    0 12px 36px rgba(0,0,0,.64);
  transition:all .28s ease;
}
.sbtn.live .sbg{
  background:linear-gradient(155deg,rgba(255,69,58,.58) 0%,rgba(195,38,28,.32) 45%,rgba(8,8,12,.72) 100%);
  box-shadow:0 0 0 1px rgba(255,69,58,.30),0 1px 0 rgba(255,255,255,.18) inset,0 0 36px rgba(255,69,58,.20),0 12px 36px rgba(0,0,0,.64);
}
.sbtn svg{position:relative;z-index:1;width:25px;height:25px;fill:var(--t1);stroke:none;filter:drop-shadow(0 1px 3px rgba(0,0,0,.45))}
#ssub{font-size:9.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--green);transition:color .28s}
.sbtn.live~#ssub{color:var(--red)}

/* ── STATS VIEW ── */
#view-stats{
  min-height:100dvh;
  padding:max(44px,env(safe-area-inset-top,44px)) 20px calc(100px + env(safe-area-inset-bottom,0px));
  gap:18px;
}
.stbar{display:flex;align-items:baseline;gap:12px;padding:2px 2px}
.sttitle{font-size:30px;font-weight:800;letter-spacing:-.03em}
.stgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stile{
  padding:20px 20px 16px;border-radius:26px;
  background:var(--g1);
  backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);
  box-shadow:0 0 0 1px rgba(255,255,255,.075),0 1px 0 rgba(255,255,255,.11) inset,0 14px 44px rgba(0,0,0,.54);
  display:flex;flex-direction:column;gap:12px;position:relative;overflow:hidden;
}
.stile::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.13) 35%,rgba(255,255,255,.13) 65%,transparent);
}
.stile.ag{background:linear-gradient(148deg,rgba(50,215,75,.14) 0%,var(--g1) 55%)}
.stile.au{background:linear-gradient(148deg,rgba(255,214,10,.11) 0%,var(--g1) 55%)}
.stile-ico{width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.stile-ico svg{width:20px;height:20px;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.stile.ag .stile-ico svg{stroke:var(--green)}
.stile.au .stile-ico svg{stroke:var(--gold)}
.stile:not(.ag):not(.au) .stile-ico svg{stroke:var(--t3)}
.stval{font-family:var(--mono);font-size:38px;font-weight:800;letter-spacing:-.04em;color:var(--t1);line-height:1;font-variant-numeric:tabular-nums}
.stile.ag .stval{color:var(--green)}
.stile.au .stval{color:var(--gold)}
.stkey{font-size:10.5px;font-weight:600;color:var(--t3);letter-spacing:.08em;text-transform:uppercase}
.sectl{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.10em;text-transform:uppercase;padding:0 2px}
.hgrp{
  background:var(--g1);
  backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);
  border-radius:24px;overflow:hidden;
  box-shadow:0 0 0 1px rgba(255,255,255,.075),0 1px 0 rgba(255,255,255,.11) inset,0 14px 44px rgba(0,0,0,.50);
}
.hrow{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.05);
  transition:background .15s;position:relative;
}
.hrow:last-child{border-bottom:none}
.hrow:active{background:rgba(255,255,255,.04)}
.hrl{display:flex;align-items:center;gap:14px}
.hcirc{
  width:38px;height:38px;border-radius:50%;
  background:var(--g2);border:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;
}
.hdate{font-size:14px;font-weight:600;color:var(--t2)}
.hdur{font-size:12px;color:var(--t3);margin-top:2px}
.hrr{display:flex;align-items:center;gap:8px}
.hnum{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--t1);letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.hchev svg{width:12px;height:12px;fill:none;stroke:var(--t4);stroke-width:2.2}
.empty{display:flex;flex-direction:column;align-items:center;gap:14px;padding:60px 24px;color:var(--t3);text-align:center}
.eico{font-size:58px}
.etitle{font-size:17px;font-weight:700;color:var(--t2)}
.esub{font-size:14px;line-height:1.55}

/* ── Desktop ── */
@media(min-width:768px){
  body{flex-direction:row}
  nav{
    position:static;transform:none;
    width:80px;height:100vh;flex-direction:column;justify-content:center;
    border-radius:0;padding:0;gap:6px;
    border:none;border-right:1px solid rgba(255,255,255,.06);
    background:rgba(6,6,10,.9);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
    box-shadow:none;
  }
  .nb{padding:16px 0;width:100%;border-radius:0;min-width:0}
  .nb.active{background:rgba(255,255,255,.07)}
  main{flex:1;overflow-y:auto}
  #view-count{
    min-height:100vh;padding:0 56px;
    display:grid;grid-template-columns:1fr auto;
    max-width:840px;margin:0 auto;
    align-items:center;gap:52px;padding-bottom:0;
  }
  .chip{top:40px;position:absolute;grid-column:1/-1}
  .sc{padding:100px 0 56px;height:100vh;justify-content:center}
  .ctrls{
    flex-direction:column;align-items:flex-start;
    justify-content:center;height:100vh;padding:40px 0;
    gap:16px;
  }
  .cbtn,.sbtn{flex-shrink:0}
  .swrap{flex-direction:row;gap:14px;align-items:center}
  .cbtn-wrap{display:flex;align-items:center;gap:14px}
  .dlbl{font-size:13px;font-weight:500;color:var(--t2);letter-spacing:-.01em}
  .cbtn.minus~.dlbl{color:var(--red)}
  .cbtn.rst~.dlbl{color:var(--t3)}
  #ssub{position:static;font-size:12px}
  #view-stats{min-height:100vh;max-width:560px;margin:0 auto;padding:60px 40px 80px}
}
</style>
</head>
<body>

<nav>
  <button class="nb active" id="nb-count" onclick="goTo('count',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    <span class="nl">Count</span>
  </button>
  <button class="nb" id="nb-stats" onclick="goTo('stats',this)">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span class="nl">Stats</span>
  </button>
</nav>

<main>

  <!-- COUNT -->
  <div class="view active" id="view-count">
    <div class="chip" id="chip">
      <div class="pip" id="pip"></div>
      <span id="slbl">Sin sesión</span>
      <span id="stimer"></span>
    </div>

    <div class="sc" id="sc" onclick="addPiece()">
      <div class="disc" id="disc">
        <span class="emoji-el" id="emoji">🍣</span>
      </div>
      <div class="cblock">
        <div class="ndisp" id="ndisp">00</div>
        <div class="nlbl">pieces</div>
        <div class="ntype" id="ntype">Nigiri</div>
      </div>
    </div>

    <div class="ctrls" id="ctrls">
      <div class="cbtn-wrap">
        <button class="cbtn minus" onclick="removePiece()">
          <div class="cbg"></div>
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12" stroke-width="2.3"/></svg>
        </button>
        <span class="dlbl" style="display:none">–1 pieza</span>
      </div>

      <div class="swrap">
        <button class="sbtn" id="sbtn" onclick="toggleSession()">
          <div class="sbg"></div>
          <svg id="ssvg" viewBox="0 0 24 24"><polygon points="6 3 20 12 6 21"/></svg>
        </button>
        <span id="ssub">Iniciar</span>
      </div>

      <div class="cbtn-wrap">
        <button class="cbtn rst" onclick="resetSession()">
          <div class="cbg"></div>
          <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4" stroke-width="1.85"/></svg>
        </button>
        <span class="dlbl" style="display:none">Reiniciar</span>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div class="view" id="view-stats">
    <div class="stbar"><span class="sttitle">Statistics</span></div>
    <div id="sgrid"></div>
    <div class="sectl" id="hlbl" style="display:none">Historial</div>
    <div class="hgrp" id="hlist" style="display:none"></div>
  </div>

</main>

<script>
const SU=[
  {e:'🍣',n:'Nigiri'},{e:'🍙',n:'Onigiri'},{e:'🥟',n:'Gyoza'},
  {e:'🍤',n:'Ebi Fry'},{e:'🍱',n:'Bento Box'},{e:'🦐',n:'Ebi Nigiri'},
  {e:'🐟',n:'Sashimi'},{e:'🍜',n:'Ramen'},{e:'🥢',n:'Temaki'},
  {e:'🦑',n:'Ika'},{e:'🐙',n:'Takoyaki'},{e:'🍘',n:'Uramaki'},
];
const DEF={p:0,ei:0,sa:false,ss:null,hist:[]};
let S=JSON.parse(localStorage.getItem('sc5')||JSON.stringify(DEF));
S.hist=(S.hist||[]).map(h=>({...h,d:h.d||0}));
let tk=null;
const save=()=>localStorage.setItem('sc5',JSON.stringify(S));
const elap=()=>S.ss?Math.floor((Date.now()-S.ss)/1000):0;
const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
const fmtD=d=>new Date(d).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});

function toggleSession(){
  if(!S.sa){
    S.sa=true;S.ss=Date.now();S.p=0;S.ei=0;
    save();refreshSess();refreshCount();
    tk=setInterval(()=>{const e=document.getElementById('stimer');if(e)e.textContent=fmt(elap());},1000);
  }else stopSess();
}
function stopSess(){
  if(!S.sa)return;
  clearInterval(tk);tk=null;
  S.hist.unshift({date:new Date().toISOString().split('T')[0],pieces:S.p,d:elap()});
  if(S.hist.length>100)S.hist.length=100;
  S.sa=false;S.ss=null;save();refreshSess();
}
function resetSession(){
  if(S.sa&&!confirm('¿Terminar la sesión y reiniciar?'))return;
  if(S.sa)stopSess();
  S.p=0;S.ei=0;save();refreshCount();
}
function refreshSess(){
  const chip=document.getElementById('chip');
  const pip=document.getElementById('pip');
  const slbl=document.getElementById('slbl');
  const stim=document.getElementById('stimer');
  const sbtn=document.getElementById('sbtn');
  const ssvg=document.getElementById('ssvg');
  const ssub=document.getElementById('ssub');
  if(S.sa){
    chip.classList.add('live');pip.classList.add('on');
    slbl.textContent='En sesión';stim.textContent=fmt(elap());stim.classList.add('on');
    sbtn.classList.add('live');
    ssvg.innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    ssub.textContent='Parar';ssub.style.color='var(--red)';
    if(!tk)tk=setInterval(()=>{const e=document.getElementById('stimer');if(e)e.textContent=fmt(elap());},1000);
  }else{
    chip.classList.remove('live');pip.classList.remove('on');
    slbl.textContent='Sin sesión';stim.textContent='';stim.classList.remove('on');
    sbtn.classList.remove('live');
    ssvg.innerHTML='<polygon points="6 3 20 12 6 21"/>';
    ssub.textContent='Iniciar';ssub.style.color='var(--green)';
    clearInterval(tk);tk=null;
  }
}
function addPiece(){
  if(!S.sa){toggleSession();return;}
  S.p++;S.ei=(S.ei+1)%SU.length;save();refreshCount(true);
}
function removePiece(){
  if(S.p<=0)return;
  S.p--;if(S.p>0)S.ei=((S.ei-1)+SU.length)%SU.length;
  save();refreshCount();
}
function refreshCount(pop=false){
  document.getElementById('ndisp').textContent=S.p.toString().padStart(2,'0');
  document.getElementById('emoji').textContent=SU[S.ei%SU.length].e;
  document.getElementById('ntype').textContent=SU[S.ei%SU.length].n;
  if(pop){
    const d=document.getElementById('disc');
    d.classList.remove('bounce','press');void d.offsetWidth;
    d.classList.add('bounce');setTimeout(()=>d.classList.remove('bounce'),340);
  }
}
const disc=document.getElementById('disc');
const sc=document.getElementById('sc');
sc.addEventListener('pointerdown',()=>{disc.classList.remove('bounce');disc.classList.add('press');});
['pointerup','pointerleave','pointercancel'].forEach(ev=>sc.addEventListener(ev,()=>disc.classList.remove('press')));

function renderStats(){
  const sg=document.getElementById('sgrid');
  const hl=document.getElementById('hlist');
  const hlbl=document.getElementById('hlbl');
  if(!S.hist.length){
    sg.innerHTML=`<div class="empty"><div class="eico">🍣</div><div class="etitle">Sin sesiones</div><div class="esub">Inicia una sesión y empieza<br>a contar piezas.</div></div>`;
    hl.style.display='none';hlbl.style.display='none';return;
  }
  const tot=S.hist.reduce((a,h)=>a+h.pieces,0);
  const best=Math.max(...S.hist.map(h=>h.pieces));
  const avg=Math.round(tot/S.hist.length);
  const cnt=S.hist.length;
  sg.innerHTML=`<div class="stgrid">
    <div class="stile ag">
      <div class="stile-ico"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
      <div class="stval">${tot}</div><div class="stkey">Total piezas</div>
    </div>
    <div class="stile">
      <div class="stile-ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
      <div class="stval">${cnt}</div><div class="stkey">Sesiones</div>
    </div>
    <div class="stile au">
      <div class="stile-ico"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
      <div class="stval">${best}</div><div class="stkey">Récord</div>
    </div>
    <div class="stile">
      <div class="stile-ico"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
      <div class="stval">${avg}</div><div class="stkey">Media</div>
    </div>
  </div>`;
  hlbl.style.display='block';hl.style.display='block';hl.innerHTML='';
  S.hist.slice(0,15).forEach(h=>{
    const r=document.createElement('div');r.className='hrow';
    r.innerHTML=`<div class="hrl"><div class="hcirc">🍣</div><div><div class="hdate">${fmtD(h.date)}</div><div class="hdur">${fmt(h.d||0)}</div></div></div>
      <div class="hrr"><div class="hnum">${String(h.pieces).padStart(2,'0')}</div><div class="hchev"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div></div>`;
    hl.appendChild(r);
  });
}
function adaptDesk(){
  const d=window.innerWidth>=768;
  document.querySelectorAll('.dlbl').forEach(el=>el.style.display=d?'inline':'none');
}
window.addEventListener('resize',adaptDesk);adaptDesk();
function goTo(id,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='stats')renderStats();
  document.querySelector('main').scrollTop=0;
}
refreshCount();refreshSess();
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
