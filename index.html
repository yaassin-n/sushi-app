<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sushi Counter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e2130">
<meta name="apple-mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #1c1f2e;
    --bg2:      #252938;
    --bg3:      #2e3347;
    --accent:   #e8624a;
    --accent2:  #f0856e;
    --gold:     #f5c842;
    --text:     #eeeef5;
    --muted:    #7b7f99;
    --muted2:   #9599b8;
    --radius:   22px;
    --radius-sm:14px;
    --nav-h:    72px;
    --font:     'DM Sans', sans-serif;
    --mono:     'DM Mono', monospace;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* ── MAIN / VIEWS ─────────────────────────────── */
  main {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    position: relative;
  }
  .view { display:none; animation: fadeUp .35s ease; }
  .view.active { display:flex; flex-direction:column; }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ── BOTTOM NAV ───────────────────────────────── */
  nav {
    height: var(--nav-h);
    background: var(--bg2);
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: stretch;
    flex-shrink: 0;
    z-index: 50;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-btn {
    flex: 1; border:none; background:none; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap: 5px; color: var(--muted); transition: color .2s;
    font-family: var(--font);
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width:22px; height:22px; stroke-width:2; }
  .nav-label { font-size:10px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; }

  /* ── COUNT VIEW ───────────────────────────────── */
  #view-count {
    min-height: calc(100vh - var(--nav-h));
    align-items: center;
    justify-content: center;
    padding: 32px 24px 32px;
    gap: 0;
    position: relative;
  }

  /* Session banner */
  .session-banner {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg2);
    border-radius: 40px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
  }
  .session-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }
  .session-dot.live { background: #4ade80; box-shadow: 0 0 8px #4ade80; animation: blink 1.4s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
  .session-timer {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted2);
  }
  .session-timer.live { color: var(--text); }

  /* Sushi emoji + counter */
  .sushi-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    padding: 20px 0;
  }
  .sushi-emoji {
    font-size: clamp(80px, 20vw, 120px);
    line-height: 1;
    transition: transform .15s cubic-bezier(.34,1.56,.64,1);
    filter: drop-shadow(0 8px 24px rgba(0,0,0,.4));
  }
  .sushi-emoji.pop {
    transform: scale(1.25) rotate(-5deg);
  }

  .piece-count {
    font-family: var(--mono);
    font-size: clamp(72px, 22vw, 120px);
    font-weight: 500;
    line-height: 1;
    letter-spacing: -2px;
    color: var(--text);
    transition: transform .12s ease;
  }
  .piece-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: -4px;
  }

  /* Action buttons row */
  .action-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 12px 0 8px;
  }
  .act-btn {
    width: 64px; height: 64px;
    border-radius: 50%; border: none; cursor: pointer;
    display: flex; flex-direction:column; align-items:center; justify-content:center;
    gap: 4px;
    background: var(--bg2);
    color: var(--muted2);
    font-family: var(--font);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .3px;
    transition: background .2s, transform .15s;
  }
  .act-btn:active { transform: scale(.92); }
  .act-btn svg { width:20px; height:20px; }
  .act-btn.danger { color: var(--accent); }
  .act-btn.start-btn {
    width: 80px; height: 80px;
    background: var(--accent);
    color: white;
    font-size: 11px;
    box-shadow: 0 8px 24px rgba(232,98,74,.4);
  }
  .act-btn.start-btn.live {
    background: #2e4a38;
    color: #4ade80;
    box-shadow: 0 8px 24px rgba(74,222,128,.25);
  }

  /* Sushi name tag */
  .sushi-name {
    font-size: 12px; font-weight:700; letter-spacing:.8px;
    text-transform: uppercase; color: var(--muted);
    min-height:18px;
    transition: opacity .2s;
  }

  /* ── STATS VIEW ──────────────────────────────── */
  #view-stats {
    padding: 32px 20px 24px;
    min-height: calc(100vh - var(--nav-h));
    gap: 16px;
  }
  .stats-header {
    display:flex; align-items:center; gap:12px; margin-bottom:6px;
  }
  .stats-title {
    font-size: 22px; font-weight: 800; letter-spacing:-.3px;
  }
  .stats-emoji { font-size: 22px; }

  .stats-card {
    background: var(--bg2);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .stat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-left { display:flex; flex-direction:column; gap:3px; }
  .stat-key {
    font-size: 15px; font-weight: 600; color: var(--text);
  }
  .stat-val {
    font-family: var(--mono);
    font-size: 20px; font-weight: 500;
    color: var(--text);
  }
  .stat-val.highlight {
    color: var(--gold);
    display:flex; align-items:center; gap:6px;
  }
  .stat-val.highlight::before { content:'🏆'; font-size:16px; }

  .stat-icon { font-size: 22px; }

  /* History list */
  .history-title {
    font-size: 13px; font-weight:700; color:var(--muted); letter-spacing:.5px;
    text-transform:uppercase; padding: 0 4px;
  }
  .history-list { display:flex; flex-direction:column; gap:10px; }
  .hist-item {
    background: var(--bg2);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    display: flex; align-items:center; justify-content:space-between;
  }
  .hist-date { font-size:13px; color:var(--muted2); font-weight:600; }
  .hist-pieces { font-family:var(--mono); font-size:18px; font-weight:500; }
  .hist-dur { font-size:11px; color:var(--muted); margin-top:2px; }
  .empty-state {
    text-align:center; color:var(--muted); padding:40px 20px;
    font-size:14px; display:flex; flex-direction:column; align-items:center; gap:12px;
  }
  .empty-state .big { font-size:48px; }

  /* ── DESKTOP LAYOUT ──────────────────────────── */
  @media (min-width: 768px) {
    body { flex-direction: row; }
    nav {
      width: 100px; height:100vh;
      border-top:none; border-right:1px solid rgba(255,255,255,0.06);
      flex-direction:column; justify-content:flex-start;
      padding: 48px 0 32px;
    }
    .nav-btn { gap:8px; padding:18px 0; }
    main { flex:1; overflow-y:auto; }
    #view-count {
      min-height: 100vh;
      padding-top:60px;
    }
    #view-stats {
      max-width: 560px;
      margin: 0 auto;
      padding: 48px 32px;
      min-height:100vh;
    }
    .session-banner { top: 32px; }
  }
</style>
</head>
<body>

<main>
  <!-- ══ COUNT VIEW ══════════════════════════════ -->
  <div class="view active" id="view-count">

    <!-- Session top banner -->
    <div class="session-banner" id="session-banner">
      <div class="session-dot" id="session-dot"></div>
      <span id="session-label">Sin sesión</span>
      <span class="session-timer" id="session-timer"></span>
    </div>

    <!-- Sushi central (clickable) -->
    <div class="sushi-area" id="sushi-area" onclick="addPiece()">
      <div class="sushi-emoji" id="sushi-emoji">🍣</div>
      <div class="piece-count" id="piece-count">00</div>
      <div class="piece-label">pieces</div>
      <div class="sushi-name" id="sushi-name">Nigiri</div>
    </div>

    <!-- Buttons -->
    <div class="action-row">
      <!-- -1 -->
      <button class="act-btn danger" onclick="removePiece()" title="–1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        –1
      </button>

      <!-- START / STOP SESSION -->
      <button class="act-btn start-btn" id="start-btn" onclick="toggleSession()">
        <svg id="start-icon" viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <polygon points="5 3 19 12 5 21"/>
        </svg>
        <span id="start-label">Iniciar</span>
      </button>

      <!-- RESET -->
      <button class="act-btn danger" onclick="resetSession()" title="Reset">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 .49-4"/>
        </svg>
        Reset
      </button>
    </div>

  </div>

  <!-- ══ STATS VIEW ══════════════════════════════ -->
  <div class="view" id="view-stats">
    <div class="stats-header">
      <span class="stats-emoji">🍱</span>
      <span class="stats-title" id="stats-user-name">Solo</span>
    </div>

    <div class="stats-card" id="stats-card">
      <!-- filled by JS -->
    </div>

    <div class="history-title">Historial de sesiones</div>
    <div class="history-list" id="history-list"></div>
  </div>
</main>

<!-- ══ BOTTOM / SIDE NAV ══════════════════════════ -->
<nav>
  <button class="nav-btn active" id="nav-count" onclick="goTo('count', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="16"/>
      <line x1="8" y1="12" x2="16" y2="12"/>
    </svg>
    <span class="nav-label">Count</span>
  </button>
  <button class="nav-btn" id="nav-stats" onclick="goTo('stats', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <line x1="18" y1="20" x2="18" y2="10"/>
      <line x1="12" y1="20" x2="12" y2="4"/>
      <line x1="6" y1="20" x2="6" y2="14"/>
    </svg>
    <span class="nav-label">Stats</span>
  </button>
</nav>

<script>
// ── DATA ──────────────────────────────────────────────────────
const SUSHI_PIECES = [
  { emoji:'🍣', name:'Nigiri' },
  { emoji:'🍙', name:'Onigiri' },
  { emoji:'🥟', name:'Gyoza' },
  { emoji:'🍤', name:'Ebi Fry' },
  { emoji:'🍱', name:'Bento' },
  { emoji:'🦐', name:'Ebi Nigiri' },
  { emoji:'🐟', name:'Sashimi' },
  { emoji:'🍜', name:'Ramen' },
  { emoji:'🥢', name:'Temaki' },
  { emoji:'🦑', name:'Ika' },
  { emoji:'🐙', name:'Takoyaki' },
  { emoji:'🍘', name:'Uramaki' },
];

const DEFAULT_STATE = {
  currentPieces: 0,
  emojiIndex: 0,
  sessionActive: false,
  sessionStart: null,
  sessions: []  // [{date, pieces, durationSec}]
};

let state = JSON.parse(localStorage.getItem('sushiState') || JSON.stringify(DEFAULT_STATE));

// Migrate old sessions without durationSec
state.sessions = (state.sessions || []).map(s => ({...s, durationSec: s.durationSec || 0}));

// ── TIMER ─────────────────────────────────────────────────────
let timerInterval = null;

function save() { localStorage.setItem('sushiState', JSON.stringify(state)); }

function sessionElapsed() {
  if (!state.sessionStart) return 0;
  return Math.floor((Date.now() - state.sessionStart) / 1000);
}

function fmtTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' });
}

function tickTimer() {
  const elapsed = sessionElapsed();
  const el = document.getElementById('session-timer');
  if (el) el.textContent = fmtTime(elapsed);
}

// ── SESSION ───────────────────────────────────────────────────
function toggleSession() {
  if (!state.sessionActive) {
    // Start
    state.sessionActive = true;
    state.sessionStart = Date.now();
    state.currentPieces = 0;
    state.emojiIndex = 0;
    save();
    updateSessionUI();
    updateCountUI();
    timerInterval = setInterval(tickTimer, 1000);
  } else {
    // End
    endSession();
  }
}

function endSession() {
  if (!state.sessionActive) return;
  clearInterval(timerInterval);
  const dur = sessionElapsed();
  const today = new Date().toISOString().split('T')[0];
  state.sessions.unshift({
    date: today,
    pieces: state.currentPieces,
    durationSec: dur
  });
  // keep only 100 last
  if (state.sessions.length > 100) state.sessions.length = 100;
  state.sessionActive = false;
  state.sessionStart = null;
  save();
  updateSessionUI();
}

function resetSession() {
  if (state.sessionActive) {
    if (!confirm('¿Terminar la sesión actual y reiniciar?')) return;
    endSession();
  }
  state.currentPieces = 0;
  state.emojiIndex = 0;
  save();
  updateCountUI();
}

function updateSessionUI() {
  const dot   = document.getElementById('session-dot');
  const label = document.getElementById('session-label');
  const timer = document.getElementById('session-timer');
  const btn   = document.getElementById('start-btn');
  const icon  = document.getElementById('start-icon');
  const lbl   = document.getElementById('start-label');

  if (state.sessionActive) {
    dot.classList.add('live');
    label.textContent = 'En sesión';
    timer.classList.add('live');
    timer.textContent = fmtTime(sessionElapsed());
    btn.classList.add('live');
    icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    icon.setAttribute('fill','currentColor');
    lbl.textContent = 'Parar';
    if (!timerInterval) timerInterval = setInterval(tickTimer, 1000);
  } else {
    dot.classList.remove('live');
    label.textContent = 'Sin sesión';
    timer.textContent = '';
    timer.classList.remove('live');
    btn.classList.remove('live');
    icon.innerHTML = '<polygon points="5 3 19 12 5 21"/>';
    icon.setAttribute('fill','currentColor');
    lbl.textContent = 'Iniciar';
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

// ── COUNTER ───────────────────────────────────────────────────
function addPiece() {
  if (!state.sessionActive) {
    // Auto-start if no session
    toggleSession();
    return;
  }
  state.currentPieces++;
  state.emojiIndex = (state.emojiIndex + 1) % SUSHI_PIECES.length;
  save();
  updateCountUI(true);
}

function removePiece() {
  if (state.currentPieces <= 0) return;
  state.currentPieces--;
  if (state.currentPieces > 0) {
    state.emojiIndex = ((state.emojiIndex - 1) + SUSHI_PIECES.length) % SUSHI_PIECES.length;
  }
  save();
  updateCountUI(false, true);
}

function updateCountUI(pop=false, minus=false) {
  const countEl = document.getElementById('piece-count');
  const emojiEl = document.getElementById('sushi-emoji');
  const nameEl  = document.getElementById('sushi-name');

  countEl.textContent = state.currentPieces.toString().padStart(2,'0');
  emojiEl.textContent = SUSHI_PIECES[state.emojiIndex % SUSHI_PIECES.length].emoji;
  nameEl.textContent  = SUSHI_PIECES[state.emojiIndex % SUSHI_PIECES.length].name;

  if (pop) {
    emojiEl.classList.add('pop');
    setTimeout(() => emojiEl.classList.remove('pop'), 200);
  }
}

// ── STATS ─────────────────────────────────────────────────────
function calcStats() {
  const sessions = state.sessions;
  if (!sessions.length) return null;
  const total = sessions.reduce((a,s) => a + s.pieces, 0);
  const best  = Math.max(...sessions.map(s => s.pieces));
  const avg   = Math.round(total / sessions.length);
  return { total, count: sessions.length, best, avg };
}

function renderStats() {
  const card     = document.getElementById('stats-card');
  const histList = document.getElementById('history-list');
  const st       = calcStats();

  if (!st) {
    card.innerHTML = `<div class="empty-state"><div class="big">🍣</div><span>Todavía no hay sesiones.<br>¡Empieza a comer!</span></div>`;
    histList.innerHTML = '';
    return;
  }

  card.innerHTML = `
    <div class="stat-row">
      <div class="stat-left">
        <div class="stat-key">Total de piezas</div>
      </div>
      <div class="stat-val">${st.total}</div>
    </div>
    <div class="stat-row">
      <div class="stat-left">
        <div class="stat-key">Sesiones</div>
      </div>
      <div class="stat-val">${st.count}</div>
    </div>
    <div class="stat-row">
      <div class="stat-left">
        <div class="stat-key">Récord personal</div>
      </div>
      <div class="stat-val highlight">${st.best}</div>
    </div>
    <div class="stat-row">
      <div class="stat-left">
        <div class="stat-key">Media por sesión</div>
      </div>
      <div class="stat-val">${st.avg}</div>
    </div>
  `;

  histList.innerHTML = '';
  if (!state.sessions.length) return;
  state.sessions.slice(0, 20).forEach(s => {
    const el = document.createElement('div');
    el.className = 'hist-item';
    el.innerHTML = `
      <div>
        <div class="hist-date">${fmtDate(s.date)}</div>
        <div class="hist-dur">${fmtTime(s.durationSec || 0)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:20px">🍣</span>
        <span class="hist-pieces">${s.pieces}</span>
      </div>`;
    histList.appendChild(el);
  });
}

// ── NAV ───────────────────────────────────────────────────────
function goTo(id, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`view-${id}`).classList.add('active');
  btn.classList.add('active');
  if (id === 'stats') renderStats();
}

// ── BOOT ──────────────────────────────────────────────────────
updateCountUI();
updateSessionUI();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
